<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeRadar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #07090C; font-family: 'Inter Tight', system-ui, sans-serif; color: rgba(235,238,244,0.95); min-height: 100vh; }
  * { box-sizing: border-box; }
  @keyframes tw-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  #root { width: 100%; min-height: 100vh; }
  .tr-shell { min-width: 1280px; min-height: 820px; }
  .tr-nav-btn:hover { background: #171C24 !important; color: rgba(235,238,244,0.95) !important; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="screens/historical.jsx"></script>
<script type="text/babel" src="screens/projected.jsx"></script>
<script type="text/babel" src="screens/impact.jsx"></script>
<script type="text/babel" src="screens/recommendations.jsx"></script>
<script type="text/babel" src="screens/news.jsx"></script>
<script type="text/babel" src="screens/calendar.jsx"></script>
<script type="text/babel" src="screens/signals.jsx"></script>
<script type="text/babel">
// TradeRadar app shell — unified 7-tab nav. Screens that accept onNav route via
// the top-level state. Standalone screens (News / Calendar / Signals) are
// wrapped with a matching nav bar so all 7 tabs navigate consistently.

const TR_TOKENS = {
  ink000: '#07090C', ink100: '#0B0E13', ink200: '#10141B', ink300: '#171C24', ink400: '#1E2430',
  edge: 'rgba(255,255,255,0.06)', edgeHi: 'rgba(255,255,255,0.10)',
  text: 'rgba(235,238,244,0.95)', textMid: 'rgba(180,188,200,0.75)', textDim: 'rgba(130,138,150,0.55)',
  signal: '#E8B84A',
  ui: 'InterTight, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif',
  mono: '"JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace',
};

const TR_TABS = [
  { key: 'historical',  label: 'Historical'  },
  { key: 'projected',   label: 'Projected'   },
  { key: 'impact',      label: 'Impact'      },
  { key: 'recommend',   label: 'Recommend'   },
  { key: 'news',        label: 'News'        },
  { key: 'calendar',    label: 'Calendar'    },
  { key: 'signals',     label: 'Signals'     },
];

function TRHeader({ tab, onNav }) {
  const T = TR_TOKENS;
  return (
    <div style={{
      height: 52, display: 'flex', alignItems: 'center',
      padding: '0 20px', borderBottom: `1px solid ${T.edge}`,
      background: T.ink100,
    }}>
      <div style={{
        width: 28, height: 28, borderRadius: 7,
        background: 'linear-gradient(180deg, #1A2030 0%, #0B0E13 100%)',
        boxShadow: 'inset 0 0.5px 0 rgba(255,255,255,0.08)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 11, fontWeight: 600, letterSpacing: 0.6, color: T.signal,
        fontFamily: T.mono,
      }}>TR</div>
      <div style={{
        marginLeft: 12, fontSize: 13, fontWeight: 500, color: T.text, letterSpacing: 0.2,
      }}>TradeRadar</div>

      <div style={{
        marginLeft: 32, display: 'flex', padding: 3,
        background: T.ink200, borderRadius: 10, border: `1px solid ${T.edge}`,
        height: 34, alignItems: 'center',
      }}>
        {TR_TABS.map((t, idx) => {
          const active = t.key === tab;
          return (
            <div key={t.key} className="tr-nav-btn"
              onClick={() => !active && onNav && onNav(t.key)}
              style={{
                padding: '0 12px', height: 28, display: 'flex', alignItems: 'center', gap: 6,
                fontSize: 12.5, fontWeight: 500, borderRadius: 7,
                background: active ? T.ink400 : 'transparent',
                color: active ? T.text : T.textMid,
                boxShadow: active ? 'inset 0 0.5px 0 rgba(255,255,255,0.12), 0 1px 2px rgba(0,0,0,0.4)' : 'none',
                cursor: active ? 'default' : 'pointer',
                transition: 'background 120ms cubic-bezier(0.2,0.7,0.2,1), color 120ms cubic-bezier(0.2,0.7,0.2,1)',
              }}>
              <span style={{
                fontFamily: T.mono, fontSize: 10, color: active ? T.signal : T.textDim,
                fontWeight: 600, letterSpacing: 0.3,
              }}>{idx + 1}.</span>
              {t.label}
            </div>
          );
        })}
      </div>

      <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 16 }}>
        <div style={{ fontFamily: T.mono, fontSize: 11, color: T.textMid, letterSpacing: 0.4 }}>
          <span style={{ color: T.signal, animation: 'tw-pulse 2s ease-in-out infinite' }}>●</span>&nbsp; LIVE
        </div>
      </div>
    </div>
  );
}

function TRWrap({ tab, onNav, children }) {
  return (
    <div style={{ background: TR_TOKENS.ink000, minHeight: 820 }}>
      <TRHeader tab={tab} onNav={onNav} />
      {children}
    </div>
  );
}

function TradeRadarApp() {
  const [tab, setTab] = React.useState('historical');

  // Screens that already render their own TR header via onNav
  if (tab === 'historical') return <div className="tr-shell"><HistoricalScreen       onNav={setTab} /></div>;
  if (tab === 'projected')  return <div className="tr-shell"><ProjectedScreen        onNav={setTab} /></div>;
  if (tab === 'impact')     return <div className="tr-shell"><ImpactScreen           onNav={setTab} /></div>;
  if (tab === 'recommend')  return <div className="tr-shell"><RecommendationsScreen  onNav={setTab} /></div>;

  // Standalone screens — wrap with shared header so all tabs navigate consistently
  if (tab === 'news')     return <div className="tr-shell"><TRWrap tab={tab} onNav={setTab}><NewsScreen     /></TRWrap></div>;
  if (tab === 'calendar') return <div className="tr-shell"><TRWrap tab={tab} onNav={setTab}><CalendarScreen /></TRWrap></div>;
  if (tab === 'signals')  return <div className="tr-shell"><TRWrap tab={tab} onNav={setTab}><SignalsScreen  /></TRWrap></div>;

  return <div className="tr-shell"><HistoricalScreen onNav={setTab} /></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<TradeRadarApp />);
</script>
</body>
</html>
